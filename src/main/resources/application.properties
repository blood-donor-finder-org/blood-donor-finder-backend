# Application Name
spring.application.name=Blood Donor Finder

# Server Configuration (Required for Azure)
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080,https://blood-donor-finder-frontend.vercel.app

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:blooddonordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console (optional for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging (helps Azure debugging)
logging.level.org.springframework=INFO