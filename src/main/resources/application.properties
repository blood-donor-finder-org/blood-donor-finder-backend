# Application Name
spring.application.name=Blood Donor Finder

# Server Configuration
server.port=8080

# CORS Configuration - Whitelist trusted origins
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:blooddonordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
